---
layout: default
---
<article class="post">
  <header class="post-header">
    <div class="post-meta-line">
      <p class="post-date">{{ page.date | date: "%Y.%m.%d" }}</p>
      {% if page.category %}
        <span class="category-chip">{{ page.category }}</span>
      {% endif %}
    </div>
    <h1>{{ page.title }}</h1>
  </header>

  {% if page.cover %}
    <figure class="post-cover">
      <img src="{{ page.cover | relative_url }}" alt="{{ page.title }} 대표 이미지" />
    </figure>
  {% endif %}

  <section class="post-content">{{ content }}</section>
</article>
