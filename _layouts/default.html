<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ko-KR' }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="{{ page.excerpt | strip_html | default: site.description }}" />
    <title>
      {% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}
    </title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Serif+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <header class="site-header">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">최신 글</a>
        <a href="{{ '/archive' | relative_url }}">목록</a>
        <a href="{{ '/write' | relative_url }}">작성</a>
        <a href="{{ '/about' | relative_url }}">소개</a>
      </nav>
    </header>

    <main class="page-wrap">{{ content }}</main>

    <footer class="site-footer">
      <p>© {{ "now" | date: "%Y" }} {{ site.title }}. Poems, essays, and passing days.</p>
    </footer>
  </body>
</html>
